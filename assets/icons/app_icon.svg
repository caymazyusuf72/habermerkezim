<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" />
  
  <!-- Newspaper/Document -->
  <g transform="translate(256, 256)">
    <!-- Main document -->
    <rect x="-80" y="-100" width="160" height="200" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Header line -->
    <rect x="-70" y="-85" width="140" height="8" rx="4" fill="#1565C0"/>
    
    <!-- Title lines -->
    <rect x="-70" y="-65" width="100" height="6" rx="3" fill="#333"/>
    <rect x="-70" y="-55" width="80" height="4" rx="2" fill="#666"/>
    
    <!-- Content lines -->
    <rect x="-70" y="-35" width="140" height="3" rx="1.5" fill="#999"/>
    <rect x="-70" y="-28" width="130" height="3" rx="1.5" fill="#999"/>
    <rect x="-70" y="-21" width="120" height="3" rx="1.5" fill="#999"/>
    <rect x="-70" y="-14" width="110" height="3" rx="1.5" fill="#999"/>
    
    <!-- Image placeholder -->
    <rect x="20" y="-35" width="50" height="35" rx="4" fill="#E3F2FD"/>
    <circle cx="35" cy="-25" r="6" fill="#1565C0" opacity="0.6"/>
    <polygon points="25,-15 35,-25 45,-15" fill="#1565C0" opacity="0.6"/>
    
    <!-- More content lines -->
    <rect x="-70" y="10" width="140" height="3" rx="1.5" fill="#999"/>
    <rect x="-70" y="17" width="100" height="3" rx="1.5" fill="#999"/>
    <rect x="-70" y="24" width="90" height="3" rx="1.5" fill="#999"/>
    
    <!-- RSS/Feed icon in corner -->
    <circle cx="60" cy="75" r="20" fill="#FF6F00" opacity="0.9"/>
    <circle cx="52" cy="83" r="3" fill="white"/>
    <path d="M 45 75 Q 52 68, 60 75 Q 52 82, 45 75" stroke="white" stroke-width="2" fill="none"/>
    <path d="M 40 70 Q 52 58, 65 70 Q 52 82, 40 70" stroke="white" stroke-width="2" fill="none"/>
  </g>
</svg>