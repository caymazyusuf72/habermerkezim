name: Scheduled iOS Release

on:
  schedule:
    # Run every 2 days at midnight UTC
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build-ios:
    name: 🍎 Build iOS (IPA)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
          rm -rf Payload

      - name: Generate Turkish Release Notes
        id: release_notes
        run: |
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## 🍎 Düzenli iOS Sürümü" >> $GITHUB_OUTPUT
          echo "Bu sürüm, macOS sunucu sürelerini optimize etmek için 2 günde bir otomatik olarak oluşturulmaktadır." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📦 Artifacts" >> $GITHUB_OUTPUT
          echo "- **IPA**: Apple cihazlar için (Jailbreak veya AltStore gerektirebilir)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📝 Son Değişiklikler" >> $GITHUB_OUTPUT
          git log -n 10 --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: "Planlanmış iOS Sürümü (#${{ github.run_number }})"
          body: ${{ steps.release_notes.outputs.NOTES }}
          files: app-release.ipa
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
